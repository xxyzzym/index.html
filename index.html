<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message for You</title>
    <style>
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: #fff0f3; /* Light pink/purple background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.2);
            max-width: 90%;
            width: 450px;
            position: relative;
            z-index: 10;
        }

        #open-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        #open-btn:hover {
            transform: scale(1.05);
        }

        /* Hidden Content Area */
        #content {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        h1 { color: #c9184a; margin-top: 0; }
        p { line-height: 1.6; color: #590d22; font-size: 1rem; margin-bottom: 20px; }

        /* Video Styling to fit at the bottom */
        .video-wrapper {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ffb3c1;
            margin-top: 15px;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        /* Falling Hearts */
        .heart-particle {
            position: fixed;
            top: -10%;
            color: #ff4d6d;
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="envelope">
            <div style="font-size: 3rem; margin-bottom: 10px;">💌</div>
            <h2 style="color: #c9184a;">I have something to tell you...</h2>
            <button id="open-btn" onclick="revealMessage()">Click to Open</button>
        </div>

        <div id="content">
            <h1>Hey Hon,</h1>
            <p>
                "You make every single day brighter just by being in it. 
                I wanted to make this little space just for us to remind you 
                of how much you mean to me. I hope this message finds you 
                well and made your day."
            </p>
            
            <h2 style="color: #a4133c; margin: 10px 0;">In Motion</h2>
            
            <div class="video-wrapper">
                <video id="mainVideo" controls>
                    <source src="https://i.imgur.com/KaW2e26.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        function revealMessage() {
            // Start heart shower
            setInterval(createHeart, 400);

            // Hide the button section
            document.getElementById('envelope').style.display = 'none';
            
            // Show the text and video section
            const content = document.getElementById('content');
            content.style.display = 'block';
            setTimeout(() => {
                content.style.opacity = '1';
                // Automatically play the video when opened
                document.getElementById('mainVideo').play();
            }, 50);
        }
    </script>
</body>
</html>
